image: node:18

stages:
  - api-test
  - deploy

variables:
  REPORT_DIR: reports

api_tests:

  stage: api-test

  before_script:

    # Install Java (Required for Allure)
    - apt-get update
    - apt-get install -y openjdk-17-jre

    # Verify Java
    - java -version

    # Install Newman + reporters
    - npm install -g newman
    - npm install -g newman-reporter-htmlextra
    - npm install -g newman-reporter-junitfull

    # Install Allure CLI
    - npm install -g allure-commandline

    # Create folders
    - mkdir -p $REPORT_DIR

  script:

    - echo "Running Newman API tests..."

    - newman run tests/bookstore.postman_collection.json \
        -e tests/qa.postman_environment.json \
        --reporters cli,htmlextra,junitfull \
        --reporter-htmlextra-export $REPORT_DIR/newman-report.html \
        --reporter-junitfull-export $REPORT_DIR/junit-report.xml

    - echo "Generate Allure Dashboard from JUnit..."

    # Convert JUnit XML → Allure Dashboard
    - allure generate $REPORT_DIR --clean -o public || true

    - echo "Listing public folder..."
    - ls -la public || true

  artifacts:

    when: always

    expire_in: 1 week

    paths:
      - public
      - reports/

    reports:
      junit:
        - reports/junit-report.xml


pages:

  stage: deploy

  script:
    - echo "Deploying Allure Dashboard via GitLab Pages"

  artifacts:
    paths:
      - public

  only:
    - main