image: node:18

stages:
  - api-test
  - deploy

variables:
  REPORT_DIR: reports

api_tests:

  stage: api-test

  before_script:

    - npm install -g newman
    - npm install -g newman-reporter-htmlextra
    - npm install -g newman-reporter-junitfull

    - mkdir -p $REPORT_DIR

  script:

    - newman run tests/bookstore.postman_collection.json \
        -e tests/qa.postman_environment.json \
        --reporters cli,htmlextra,junitfull \
        --reporter-htmlextra-export public/index.html \
        --reporter-junitfull-export $REPORT_DIR/junit-report.xml

  artifacts:

    when: always

    paths:
      - public
      - reports/

    reports:
      junit:
        - reports/junit-report.xml


pages:

  stage: deploy

  script:
    - echo "Deploy HTML dashboard"

  artifacts:
    paths:
      - public

  only:
    - main