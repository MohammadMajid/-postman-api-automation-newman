image: node:18

stages:
  - deploy

pages:

  stage: deploy

  before_script:

    - npm install -g newman
    - npm install -g newman-reporter-htmlextra

    - mkdir -p public
    - mkdir -p reports

  script:

    - echo "Run Newman"

    - newman run tests/bookstore.postman_collection.json \
        -e tests/qa.postman_environment.json \
        --reporters cli,htmlextra,junit \
        --reporter-htmlextra-export public/index.html \
        --reporter-junit-export reports/junit.xml

    - echo "Verify output"

    - ls -la public
    - ls -la reports

  artifacts:

    when: always

    paths:
      - public
      - reports

    reports:
      junit:
        - reports/junit.xml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'