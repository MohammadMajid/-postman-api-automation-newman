image: node:18

stages:
  - api-test
  - deploy

variables:
  REPORT_DIR: reports

# ==========================
# API TEST EXECUTION
# ==========================

api_tests:

  stage: api-test

  before_script:

    # Java required for Allure
    - apt-get update
    - apt-get install -y openjdk-17-jre

    - java -version

    # Newman + reporters
    - npm install -g newman
    - npm install -g newman-reporter-htmlextra
    - npm install -g newman-reporter-junit
    - npm install -g newman-reporter-allure

    # Allure CLI
    - npm install -g allure-commandline

    - mkdir -p $REPORT_DIR
    - mkdir -p allure-results
    - mkdir -p public

  script:

    - echo "Running Newman API tests..."

    - newman run tests/bookstore.postman_collection.json \
        -e tests/qa.postman_environment.json \
        --reporters cli,htmlextra,junit,allure \
        --reporter-htmlextra-export $REPORT_DIR/newman-report.html \
        --reporter-junit-export $REPORT_DIR/junit-report.xml \
        --reporter-allure-export allure-results || true

    - echo "Check Allure Results"
    - ls -la allure-results || true

    - echo "Generate Allure Dashboard"

    - allure generate allure-results --clean -o public || true

    - echo "Verify Public Folder"
    - ls -la public || true

  artifacts:

    when: always

    expire_in: 1 week

    paths:
      - public
      - reports/

    reports:
      junit:
        - reports/junit-report.xml


# ==========================
# GITLAB PAGES DEPLOYMENT
# ==========================

pages:

  stage: deploy

  script:
    - echo "Deploying Allure Dashboard via GitLab Pages"

  artifacts:
    paths:
      - public

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'