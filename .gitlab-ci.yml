image: node:18

stages:
  - api-test
  - deploy

variables:
  REPORT_DIR: reports

api_tests:

  stage: api-test

  before_script:

    # Install Java (Required for Allure)
    # Install Java for Allure
    - apt-get update
    - apt-get install -y openjdk-17-jre

    # Verify Java
    - java -version

    # Install Newman + reporters
    - npm install -g newman
    - npm install -g newman-reporter-htmlextra
    - npm install -g newman-reporter-junitfull
    - npm install -g newman-reporter-allure

    # Install Allure CLI
    - npm install -g allure-commandline

    # Create folders
    - mkdir -p $REPORT_DIR
    - mkdir -p allure-results

  script:

    - echo "Running Newman API tests..."
    - echo "Running Newman..."

    - newman run tests/bookstore.postman_collection.json \
        -e tests/qa.postman_environment.json \
        --reporters cli,htmlextra,junitfull \
        --reporters cli,htmlextra,junitfull,allure \
        --reporter-htmlextra-export $REPORT_DIR/newman-report.html \
        --reporter-junitfull-export $REPORT_DIR/junit-report.xml
        --reporter-junitfull-export $REPORT_DIR/junit-report.xml \
        --reporter-allure-export allure-results

    - echo "Generate Allure Dashboard from JUnit..."
    - echo "Check Allure Results"

    # Convert JUnit XML → Allure Dashboard
    - allure generate $REPORT_DIR --clean -o public || true
    - ls -la allure-results

    - echo "Listing public folder..."
    - ls -la public || true
    - echo "Generate Allure Dashboard"

    - allure generate allure-results --clean -o public

    - ls -la public

  artifacts:

    when: always

    expire_in: 1 week

    paths:
      - public
      - reports/
  stage: deploy

  script:
    - echo "Deploying Allure Dashboard via GitLab Pages"
    - echo "Deploy Pages"

  artifacts:
    paths:
      - public

  only:
    - main
