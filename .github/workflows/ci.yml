name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Newman and reporters
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g newman-reporter-allure
          npm install -g allure-commandline

      - name: Create report directories
        run: |
          mkdir -p reports
          mkdir -p allure-results
          mkdir -p public

      - name: Run Newman Tests
        run: |
          newman run bookstore.postman_collection.json \
            -e qa.postman_environment.json \
            --reporters cli,htmlextra,junit,allure \
            --reporter-htmlextra-export reports/newman-report.html \
            --reporter-junit-export reports/junit-report.xml \
            --reporter-allure-export allure-results || true

      - name: Generate Allure Dashboard
        run: |
          allure generate allure-results --clean -o public || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            reports/
            public/

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: success() || failure()
        with:
          name: Newman Tests
          path: reports/junit-report.xml
          reporter: java-junit

  deploy:
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: public/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4