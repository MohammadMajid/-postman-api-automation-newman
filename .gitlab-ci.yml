image: node:18

stages:
  - deploy

pages:
  stage: deploy

  before_script:
    - npm install -g newman
    - npm install -g newman-reporter-htmlextra
    - npm install -g newman-reporter-junitfull

    - mkdir -p public
    - mkdir -p reports

  script:
    - echo "Run Newman and build Pages site..."

    - newman run tests/bookstore.postman_collection.json \
        -e tests/qa.postman_environment.json \
        --reporters cli,htmlextra,junitfull \
        --reporter-htmlextra-export public/index.html \
        --reporter-junitfull-export reports/junit-report.xml

    # Hard checks so deploy never publishes empty output
    - echo "Verify public output:"
    - ls -la public
    - test -f public/index.html

  artifacts:
    when: always
    paths:
      - public
      - reports
    reports:
      junit:
        - reports/junit-report.xml

  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'