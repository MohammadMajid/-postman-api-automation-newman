name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write
  pages: write
  id-token: write

jobs:
  api-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Newman and reporters
        run: |
          npm install -g newman
          npm install -g newman-reporter-htmlextra
          npm install -g newman-reporter-allure
          npm install -g allure-commandline

      - name: Create report directories
        run: |
          mkdir -p reports
          mkdir -p allure-results
          mkdir -p public

      - name: Run Newman Tests
        run: |
          newman run bookstore.postman_collection.json \
            -e qa.postman_environment.json \
            --reporters cli,htmlextra,junit,allure \
            --reporter-htmlextra-export reports/newman-report.html \
            --reporter-junit-export reports/junit-report.xml \
            --reporter-allure-export allure-results || true

      - name: Generate Allure Dashboard
        run: |
          allure generate allure-results --clean -o public || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports
          path: |
            reports/
            public/

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: ${{ always() && github.actor != 'dependabot[bot]' && (github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork) }}
        with:
          name: Newman Tests
          path: reports/junit-report.xml
          reporter: java-junit

  deploy:
    runs-on: ubuntu-latest
    needs: api-tests
    if: github.ref == 'refs/heads/main' && vars.ENABLE_GITHUB_PAGES == 'true'
    env:
      SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      REPORT_EMAIL_TO: ${{ vars.REPORT_EMAIL_TO != '' && vars.REPORT_EMAIL_TO || 'mohammadnafiulmajid@gmail.com' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: test-reports
          path: .

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: false

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Zip Allure report
        if: ${{ success() && vars.ENABLE_REPORT_EMAIL == 'true' && env.SMTP_SERVER != '' && env.SMTP_PORT != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' }}
        run: zip -r allure-report.zip public

      - name: Email report
        if: ${{ success() && vars.ENABLE_REPORT_EMAIL == 'true' && env.SMTP_SERVER != '' && env.SMTP_PORT != '' && env.SMTP_USERNAME != '' && env.SMTP_PASSWORD != '' }}
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_SERVER }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USERNAME }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: API Automation Report - ${{ github.repository }} - Run #${{ github.run_number }}
          to: ${{ env.REPORT_EMAIL_TO }}
          from: ${{ vars.REPORT_EMAIL_FROM != '' && vars.REPORT_EMAIL_FROM || secrets.SMTP_USERNAME }}
          secure: true
          html_body: |
            <p>API automation execution completed successfully.</p>
            <p><strong>Repository:</strong> ${{ github.repository }}</p>
            <p><strong>Workflow:</strong> ${{ github.workflow }}</p>
            <p><strong>Run number:</strong> ${{ github.run_number }}</p>
            <p><strong>Allure report:</strong> <a href="${{ steps.deployment.outputs.page_url }}">${{ steps.deployment.outputs.page_url }}</a></p>
            <p><strong>Workflow run:</strong> <a href="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}">Open run details</a></p>
          attachments: allure-report.zip